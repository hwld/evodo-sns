pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm exec eslint --no-warn-ignored --fix {staged_files}
      stage_fixed: true
